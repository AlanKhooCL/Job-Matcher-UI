<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Matcher AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Job Matcher AI</h1>
    <p>Upload your resume and paste up to 3 job URLs to evaluate your fit.</p>

    <form id="jobForm">
      <div class="form-group">
        <label for="resume">1. Upload Resume (PDF)</label>
        <input type="file" id="resume" accept=".pdf" required>
      </div>

      <div class="form-group">
        <label>2. Paste Job URLs</label>
        <input type="url" id="url1" placeholder="Job URL 1" required>
        <input type="url" id="url2" placeholder="Job URL 2 (Optional)">
        <input type="url" id="url3" placeholder="Job URL 3 (Optional)">
      </div>

      <button type="submit" id="submitBtn">Evaluate Matches</button>
      <button id="analyze-btn" type="button">📊 Analyze Resume</button>
    </form>
    <div id="loading" class="hidden">
      <p>Scraping jobs and consulting Gemini... This might take a minute.</p>
    </div>

    <div id="results"></div>

    <div id="dashboard-container" style="display: none; margin-top: 30px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; background-color: #fafafa;">
      <h2 style="border-bottom: 2px solid #ddd; padding-bottom: 10px;">Resume DNA Dashboard</h2>
      <p id="dash-summary" style="font-style: italic; color: #555; margin-bottom: 20px;"></p>

      <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: center;">
          <div style="flex: 1; min-width: 250px;">
              <h3>Core Stats</h3>
              <p><strong>Experience:</strong> <span id="dash-exp"></span> Years</p>
              <p><strong>Top Hard Skills:</strong> <span id="dash-hard"></span></p>
              <p><strong>Top Soft Skills:</strong> <span id="dash-soft"></span></p>
          </div>

          <div style="flex: 1; min-width: 300px; max-width: 400px;">
              <canvas id="skillsRadarChart"></canvas>
          </div>
      </div>
    </div>
  </div> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
